services:
  postgres:
    image: postgres:17-alpine
    container_name: jet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: jet
      POSTGRES_PASSWORD: jet
      POSTGRES_DB: jet_commerce
    ports:
      - "5433:5432"
    volumes:
      - jet_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jet -d jet_commerce"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  jet_pgdata:
